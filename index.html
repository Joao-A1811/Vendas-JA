<style>
:root{--roxo:#5b21b6;--roxo-claro:#7c3aed;--rosa:#db2777;--laranja:#f59e0b;--texto:#1c1428;--texto-suave:#5c5470;--bg:#faf9fc}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',Arial,sans-serif;background:var(--bg);color:var(--texto)}
h1,h2{font-family:'Poppins',Arial,sans-serif}
.container{max-width:1000px;margin:0 auto;padding:0 22px}
.hero{position:relative;overflow:hidden;background:linear-gradient(160deg,var(--roxo) 0%,var(--roxo-claro) 45%,var(--rosa) 100%);color:#fff;padding:70px 0 80px;text-align:center}
.hero::before{content:'';position:absolute;width:320px;height:320px;border-radius:50%;background:var(--laranja);filter:blur(60px);opacity:.35;top:-120px;right:-80px}
.hero::after{content:'';position:absolute;width:260px;height:260px;border-radius:50%;background:#fff;filter:blur(60px);opacity:.25;bottom:-110px;left:-60px}
.idiomas{position:relative;display:flex;justify-content:center;gap:14px;font-size:12px;font-weight:700;margin-bottom:26px}
.idiomas a{color:#e9defa;text-decoration:none;padding:4px 12px;border-radius:99px;border:1px solid rgba(255,255,255,.3)}
.idiomas a.atual{color:#2b1a00;background:#fff}
.badge{display:inline-block;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);padding:6px 16px;border-radius:99px;font-size:12.5px;font-weight:600;margin-bottom:20px;position:relative}
.hero h1{font-size:clamp(28px,5vw,42px);font-weight:800;position:relative}
.hero p{color:#f0e8fb;margin-top:12px;position:relative;max-width:560px;margin-left:auto;margin-right:auto;font-size:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin:44px auto;padding:0 22px;max-width:1000px}
.card{background:#fff;border-radius:14px;padding:26px;border:1px solid #f0e8fb;box-shadow:0 4px 18px rgba(91,33,182,.08);text-decoration:none;color:var(--texto);transition:transform .2s ease, box-shadow .2s ease;display:block;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(91,33,182,.14)}
.card .tag{display:inline-block;background:#f4effc;color:var(--roxo);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:4px 10px;border-radius:99px;margin-bottom:12px}
.card .em-breve{position:absolute;top:14px;right:14px;font-size:10px;font-weight:700;color:var(--laranja);background:#fff7e6;padding:3px 9px;border-radius:99px}
.card h3{font-size:17px;margin-bottom:8px}
.card p{font-size:13.5px;color:var(--texto-suave)}
.card .cta{margin-top:14px;font-size:12.5px;font-weight:700;color:var(--rosa)}
.footer{text-align:center;padding:34px;color:var(--texto-suave);font-size:12px}
</style>
</head>
<body>

<section class="hero">
  <div class="container">
    <nav class="idiomas">
      <a href="index.html" class="atual">PT</a>
      <a href="index-en.html">EN</a>
      <a href="index-es.html">ES</a>
    </nav>
    <span class="badge">🚀 Feito pra gerar resultado, não enrolação</span>
    <h1>Sua evolução começa aqui</h1>
    <p>Métodos práticos e diretos ao ponto para transformar sua saúde, seu dinheiro e sua vida — escolha por onde começar.</p>
  </div>
</section>

<div class="grid" id="grid"></div>

<footer class="footer">NextLevel — todos os direitos reservados. ·
  <a href="/legal/privacidade.html" style="color:inherit">Privacidade</a> ·
  <a href="/legal/termos.html" style="color:inherit">Termos de uso</a>
</footer>

<script>
// A lista de produtos vem de /assets/produtos.js (um lugar só pra editar).
const IDIOMA = 'pt';
const SUFIXO_PAGINA = ''; // pt = index.html (padrão da pasta)
const TXT_EM_BREVE = 'Em breve';
const TXT_SAIBA_MAIS = 'Saiba mais →';

const lista = window.PRODUTOS_SITE || [];
document.getElementById('grid').innerHTML = lista.map(p => `
  <a class="card" href="produtos/${p.slug}/${SUFIXO_PAGINA}">
    ${p.disponivel ? '' : `<span class="em-breve">${TXT_EM_BREVE}</span>`}
    <span class="tag">${p.tag[IDIOMA]}</span>
    <h3>${p.titulo[IDIOMA]}</h3>
    <p>${p.resumo[IDIOMA]}</p>
    <div class="cta">${TXT_SAIBA_MAIS}</div>
  </a>
`).join('');
</script>

</body>
</html>
