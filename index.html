<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendas-JA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--roxo:#5b21b6;--roxo-claro:#7c3aed;--rosa:#db2777;--laranja:#f59e0b;--texto:#1c1428;--texto-suave:#5c5470;--bg:#faf9fc}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',Arial,sans-serif;background:var(--bg);color:var(--texto)}
h1,h2{font-family:'Poppins',Arial,sans-serif}
.container{max-width:1000px;margin:0 auto;padding:0 22px}
.hero{position:relative;overflow:hidden;background:linear-gradient(160deg,var(--roxo) 0%,var(--roxo-claro) 45%,var(--rosa) 100%);color:#fff;padding:60px 0 70px;text-align:center}
.hero::before{content:'';position:absolute;width:320px;height:320px;border-radius:50%;background:var(--laranja);filter:blur(60px);opacity:.35;top:-120px;right:-80px}
.hero h1{font-size:clamp(26px,5vw,38px);font-weight:800;position:relative}
.hero p{color:#f0e8fb;margin-top:10px;position:relative}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin:40px auto;padding:0 22px;max-width:1000px}
.card{background:#fff;border-radius:14px;padding:24px;border:1px solid #f0e8fb;box-shadow:0 4px 18px rgba(91,33,182,.08);text-decoration:none;color:var(--texto);transition:transform .2s ease, box-shadow .2s ease;display:block}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(91,33,182,.14)}
.card .tag{display:inline-block;background:#f4effc;color:var(--roxo);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:4px 10px;border-radius:99px;margin-bottom:12px}
.card h3{font-size:16px;margin-bottom:6px}
.card p{font-size:13px;color:var(--texto-suave)}
.footer{text-align:center;padding:30px;color:var(--texto-suave);font-size:12px}
</style>
</head>
<body>

<section class="hero">
  <div class="container">
    <h1>Catálogo Vendas-JA</h1>
    <p>Página de uso interno — cada card abaixo é uma página de vendas independente</p>
  </div>
</section>

<div class="grid" id="grid"></div>

<footer class="footer">Vendas-JA — todos os direitos reservados.</footer>

<script>
// Para adicionar um produto novo: crie a pasta em produtos/<slug>/ (copiando landing-page/index.html)
// e acrescente um item aqui.
const PRODUTOS = [
  { slug: 'emagrecimento', titulo: 'Emagrecimento', tag: 'Saúde', resumo: 'Página em construção' },
  { slug: 'ganho-de-massa', titulo: 'Ganho de Massa Muscular', tag: 'Saúde', resumo: 'Página em construção' },
  { slug: 'investimentos', titulo: 'Investimentos', tag: 'Finanças', resumo: 'Página em construção' },
  { slug: 'confianca-social', titulo: 'Confiança Social', tag: 'Relacionamentos', resumo: 'Página em construção' },
  { slug: 'comunicacao-e-relacionamentos', titulo: 'Comunicação e Relacionamentos', tag: 'Relacionamentos', resumo: 'Página em construção' }
];

document.getElementById('grid').innerHTML = PRODUTOS.map(p => `
  <a class="card" href="produtos/${p.slug}/">
    <span class="tag">${p.tag}</span>
    <h3>${p.titulo}</h3>
    <p>${p.resumo}</p>
  </a>
`).join('');
</script>

</body>
</html>
