<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categorías — NextLevel</title>
<meta name="description" content="Navega por las guías NextLevel por categoría: Salud y Fitness, Relaciones y Habilidades Sociales y más.">
<link rel="canonical" href="https://nextlevelbr.app.br/categorias/index-es.html">
<link rel="alternate" hreflang="pt-BR" href="https://nextlevelbr.app.br/categorias/">
<link rel="alternate" hreflang="en" href="https://nextlevelbr.app.br/categorias/index-en.html">
<link rel="alternate" hreflang="es" href="https://nextlevelbr.app.br/categorias/index-es.html">
<link rel="alternate" hreflang="x-default" href="https://nextlevelbr.app.br/categorias/">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<meta property="og:type" content="website">
<meta property="og:site_name" content="NextLevel">
<meta property="og:title" content="Categorías — NextLevel">
<meta property="og:description" content="Navega por las guías NextLevel por categoría: Salud y Fitness, Relaciones y Habilidades Sociales y más.">
<meta property="og:url" content="https://nextlevelbr.app.br/categorias/index-es.html">
<meta property="og:image" content="https://nextlevelbr.app.br/assets/og-image-es.png">
<meta property="og:locale" content="es_ES">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="/assets/produtos.js"></script>
<style>
:root{--roxo:#5b21b6;--roxo-claro:#7c3aed;--rosa:#db2777;--laranja:#f59e0b;--texto:#1c1428;--texto-suave:#5c5470;--bg:#faf9fc}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',Arial,sans-serif;background:var(--bg);color:var(--texto)}
h1,h2,h3{font-family:'Poppins',Arial,sans-serif}
.container{max-width:1000px;margin:0 auto;padding:0 22px}

.header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);padding:14px 0;border-bottom:1px solid #eee2f7}
.header .container{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--roxo),var(--rosa));-webkit-background-clip:text;background-clip:text;color:transparent}
.header h1 a{color:inherit;text-decoration:none}
.idiomas{display:flex;gap:12px;font-size:12px;font-weight:700}
.idiomas a{color:var(--texto-suave);text-decoration:none}
.idiomas a.atual{color:var(--roxo)}
.idiomas a:hover{color:var(--rosa)}

.hero{position:relative;overflow:hidden;background:linear-gradient(160deg,var(--roxo) 0%,var(--roxo-claro) 45%,var(--rosa) 100%);color:#fff;padding:52px 0 58px;text-align:center}
.hero::before{content:'';position:absolute;width:320px;height:320px;border-radius:50%;background:var(--laranja);filter:blur(60px);opacity:.35;top:-120px;right:-80px}
.hero h2{font-size:clamp(26px,4.5vw,38px);font-weight:800;position:relative}
.hero p{color:#f0e8fb;margin-top:10px;position:relative;max-width:560px;margin-left:auto;margin-right:auto;font-size:15.5px}

.chips{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:26px;position:relative}
.chips a{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.35);color:#fff;text-decoration:none;font-size:13px;font-weight:700;padding:9px 20px;border-radius:99px;transition:background .15s ease}
.chips a:hover{background:rgba(255,255,255,.28)}
.chips a.ativa{background:#fff;color:var(--roxo);border-color:#fff}

.categoria{padding:52px 0 8px}
.categoria .cat-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.categoria .cat-icone{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--roxo),var(--rosa));display:flex;align-items:center;justify-content:center;font-size:20px}
.categoria h3{font-size:23px;font-weight:800}
.categoria .cat-desc{color:var(--texto-suave);font-size:14px;max-width:640px;margin:6px 0 4px}
.categoria .cat-total{font-size:12px;font-weight:700;color:var(--roxo);text-transform:uppercase;letter-spacing:.4px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:22px}
.card{background:#fff;border-radius:14px;padding:26px;border:1px solid #f0e8fb;box-shadow:0 4px 18px rgba(91,33,182,.08);text-decoration:none;color:var(--texto);transition:transform .2s ease, box-shadow .2s ease;display:block;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(91,33,182,.14)}
.card .tag{display:inline-block;background:#f4effc;color:var(--roxo);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:4px 10px;border-radius:99px;margin-bottom:12px}
.card .em-breve{position:absolute;top:14px;right:14px;font-size:10px;font-weight:700;color:var(--laranja);background:#fff7e6;padding:3px 9px;border-radius:99px}
.card h4{font-size:17px;margin-bottom:8px;font-family:'Poppins',Arial,sans-serif}
.card p{font-size:13.5px;color:var(--texto-suave)}
.card .cta{margin-top:14px;font-size:12.5px;font-weight:700;color:var(--rosa)}

.voltar{display:inline-block;margin:44px 0 0;color:var(--roxo);font-weight:700;font-size:13.5px;text-decoration:none}
.voltar:hover{color:var(--rosa)}
.footer{text-align:center;padding:34px;color:var(--texto-suave);font-size:12px;margin-top:24px}
.footer a{color:inherit}
</style>
</head>
<body>

<header class="header">
  <div class="container">
    <h1><a href="/index-es.html">NextLevel</a></h1>
    <nav class="idiomas">
      <a href="index.html">PT</a>
      <a href="index-en.html">EN</a>
      <a href="index-es.html" class="atual">ES</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h2>Explora por categoría</h2>
    <p>Todas las guías NextLevel organizadas por tema — elige el área que quieres evolucionar.</p>
    <nav class="chips" id="chips"></nav>
  </div>
</section>

<main class="container" id="categorias"></main>

<div class="container" style="text-align:center">
  <a class="voltar" href="/index-es.html">← Volver a la página principal</a>
</div>

<footer class="footer">NextLevel — todos los derechos reservados. ·
  <a href="/legal/privacidade-es.html">Privacidad</a> ·
  <a href="/legal/termos-es.html">Términos de uso</a>
</footer>

<script>
// Página generada desde /assets/produtos.js: los productos se agrupan por
// `categoria` y cada categoría se vuelve una sección. Las categorías sin
// producto listado no aparecen (ej: inversiones mientras sea borrador).
const IDIOMA = 'es';
const SUFIXO_PAGINA = 'index-es.html';
const TXT_EM_BREVE = 'Muy pronto';
const TXT_SAIBA_MAIS = 'Saber más →';
const TXT_GUIA = ['guía', 'guías'];
const TXT_TODOS = '✨ Todas las guías';

const CATS = window.CATEGORIAS_SITE || {};
const lista = window.PRODUTOS_SITE || [];

const porCategoria = {};
for (const p of lista) {
  const c = p.categoria || 'outros';
  (porCategoria[c] = porCategoria[c] || []).push(p);
}

const ordem = Object.keys(CATS).filter(c => porCategoria[c]).concat(
  Object.keys(porCategoria).filter(c => !CATS[c])
);

document.getElementById('chips').innerHTML =
  `<a href="#todos" data-cat="todos">${TXT_TODOS}</a>` +
  ordem.map(c => {
    const meta = CATS[c] || { icone: '📦', nome: { [IDIOMA]: c } };
    return `<a href="#${c}" data-cat="${c}">${meta.icone} ${meta.nome[IDIOMA]}</a>`;
  }).join('');

document.getElementById('categorias').innerHTML = ordem.map(c => {
  const meta = CATS[c] || { icone: '📦', nome: { [IDIOMA]: c }, desc: { [IDIOMA]: '' } };
  const prods = porCategoria[c];
  const n = prods.length;
  return `
  <section class="categoria" id="sec-${c}">
    <div class="cat-head"><div class="cat-icone">${meta.icone}</div><h3>${meta.nome[IDIOMA]}</h3></div>
    <p class="cat-desc">${meta.desc ? meta.desc[IDIOMA] : ''}</p>
    <span class="cat-total">${n} ${n === 1 ? TXT_GUIA[0] : TXT_GUIA[1]}</span>
    <div class="grid">${prods.map(p => `
      <a class="card" href="/produtos/${p.slug}/${SUFIXO_PAGINA}">
        ${p.disponivel ? '' : `<span class="em-breve">${TXT_EM_BREVE}</span>`}
        <span class="tag">${p.tag[IDIOMA]}</span>
        <h4>${p.titulo[IDIOMA]}</h4>
        <p>${p.resumo[IDIOMA]}</p>
        <div class="cta">${TXT_SAIBA_MAIS}</div>
      </a>`).join('')}
    </div>
  </section>`;
}).join('');

// ---- filtro por categoria (chips + #hash da URL) ----
function aplicarFiltro(cat) {
  const ativo = ordem.includes(cat) ? cat : 'todos';
  document.querySelectorAll('.categoria').forEach(sec => {
    sec.style.display = (ativo === 'todos' || sec.id === 'sec-' + ativo) ? '' : 'none';
  });
  document.querySelectorAll('.chips a').forEach(a => {
    a.classList.toggle('ativa', a.dataset.cat === ativo);
  });
}
document.getElementById('chips').addEventListener('click', e => {
  const a = e.target.closest('a');
  if (!a) return;
  e.preventDefault();
  const cat = a.dataset.cat;
  history.replaceState(null, '', cat === 'todos' ? location.pathname + location.search : '#' + cat);
  aplicarFiltro(cat);
});
window.addEventListener('hashchange', () => aplicarFiltro(location.hash.slice(1)));
aplicarFiltro(location.hash.slice(1));
</script>

</body>
</html>
