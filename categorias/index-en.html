<style>
:root{--roxo:#5b21b6;--roxo-claro:#7c3aed;--rosa:#db2777;--laranja:#f59e0b;--texto:#1c1428;--texto-suave:#5c5470;--bg:#faf9fc}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',Arial,sans-serif;background:var(--bg);color:var(--texto)}
h1,h2,h3{font-family:'Poppins',Arial,sans-serif}
.container{max-width:1000px;margin:0 auto;padding:0 22px}

.header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);padding:14px 0;border-bottom:1px solid #eee2f7}
.header .container{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--roxo),var(--rosa));-webkit-background-clip:text;background-clip:text;color:transparent}
.header h1 a{color:inherit;text-decoration:none}
.idiomas{display:flex;gap:12px;font-size:12px;font-weight:700}
.idiomas a{color:var(--texto-suave);text-decoration:none}
.idiomas a.atual{color:var(--roxo)}
.idiomas a:hover{color:var(--rosa)}

.hero{position:relative;overflow:hidden;background:linear-gradient(160deg,var(--roxo) 0%,var(--roxo-claro) 45%,var(--rosa) 100%);color:#fff;padding:52px 0 58px;text-align:center}
.hero::before{content:'';position:absolute;width:320px;height:320px;border-radius:50%;background:var(--laranja);filter:blur(60px);opacity:.35;top:-120px;right:-80px}
.hero h2{font-size:clamp(26px,4.5vw,38px);font-weight:800;position:relative}
.hero p{color:#f0e8fb;margin-top:10px;position:relative;max-width:560px;margin-left:auto;margin-right:auto;font-size:15.5px}

.chips{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:26px;position:relative}
.chips a{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.35);color:#fff;text-decoration:none;font-size:13px;font-weight:700;padding:9px 20px;border-radius:99px;transition:background .15s ease}
.chips a svg{font-size:15px;flex-shrink:0}
.chips a:hover{background:rgba(255,255,255,.28)}
.chips a.ativa{background:#fff;color:var(--roxo);border-color:#fff}
.busca{position:relative;margin:18px auto 0;max-width:430px}
.busca input{width:100%;padding:12px 20px;border-radius:99px;border:none;font-size:14px;font-family:inherit;box-shadow:0 6px 24px rgba(0,0,0,.18)}
.sem-resultado{display:none;text-align:center;color:var(--texto-suave);padding:52px 0 8px;font-size:14.5px}
.escolha-categoria{text-align:center;color:var(--texto-suave);padding:60px 20px;font-size:15px}
.escolha-categoria b{display:block;color:var(--texto);font-size:19px;margin-bottom:8px;font-family:'Poppins',Arial,sans-serif}

.categoria{padding:52px 0 8px}
.categoria .cat-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.categoria .cat-icone{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--roxo),var(--rosa));display:flex;align-items:center;justify-content:center;font-size:20px}
.categoria h3{font-size:23px;font-weight:800}
.categoria .cat-desc{color:var(--texto-suave);font-size:14px;max-width:640px;margin:6px 0 4px}
.categoria .cat-total{font-size:12px;font-weight:700;color:var(--roxo);text-transform:uppercase;letter-spacing:.4px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:22px}
.card{background:#fff;border-radius:14px;padding:26px;border:1px solid #f0e8fb;box-shadow:0 4px 18px rgba(91,33,182,.08);text-decoration:none;color:var(--texto);transition:transform .2s ease, box-shadow .2s ease;display:block;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(91,33,182,.14)}
.card .tag{display:inline-block;background:#f4effc;color:var(--roxo);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:4px 10px;border-radius:99px;margin-bottom:12px}
.card .em-breve{position:absolute;top:14px;right:14px;font-size:10px;font-weight:700;color:var(--laranja);background:#fff7e6;padding:3px 9px;border-radius:99px}
.card h4{font-size:17px;margin-bottom:8px;font-family:'Poppins',Arial,sans-serif}
.card p{font-size:13.5px;color:var(--texto-suave)}
.card .cta{margin-top:14px;font-size:12.5px;font-weight:700;color:var(--rosa)}

.voltar{display:inline-block;margin:44px 0 0;color:var(--roxo);font-weight:700;font-size:13.5px;text-decoration:none}
.voltar:hover{color:var(--rosa)}
.footer{text-align:center;padding:34px;color:var(--texto-suave);font-size:12px;margin-top:24px}
.footer a{color:inherit}

/* ===== Tema escuro NextLevel (identidade dark premium, jul/2026) ===== */
:root{--roxo:#14b8a6;--roxo-claro:#0f766e;--rosa:#5eead4;--laranja:#f59e0b;--texto:#eaf4f2;--texto-suave:#b7d5cf;--bg:#0d1b2a}
a:focus-visible,input:focus-visible{outline:2px solid #5eead4;outline-offset:2px}
.header{background:rgba(13,27,42,.92);border-bottom:1px solid rgba(94,234,212,.14)}
.header h1{background:none;-webkit-background-clip:initial;background-clip:initial;color:#fff}
.idiomas a.atual{color:#5eead4}
.idiomas a:hover{color:#5eead4}
.hero{background:linear-gradient(160deg,#0d1b2a 0%,#13293d 55%,#0f766e 140%)}
.hero p{color:#cfe8e3}
.chips a.ativa{color:#04211d;background:#5eead4;border-color:#5eead4}
.busca input{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.16);box-shadow:none}
.busca input::placeholder{color:#8fb3ac}
.categoria h3{color:#fff}
.categoria .cat-icone{background:linear-gradient(135deg,#0f766e,#14b8a6)}
.categoria .cat-total{color:#5eead4}
.card{background:#132a3e;border-color:rgba(94,234,212,.14);box-shadow:0 4px 18px rgba(0,0,0,.35)}
.card:hover{box-shadow:0 10px 28px rgba(20,184,166,.18)}
.card h4{color:#fff}
.card .tag{background:rgba(94,234,212,.12);color:#5eead4}
.card .cta{color:#f59e0b}
.card .em-breve{background:#fff7e6;color:#92600a}
.voltar{color:#5eead4}
.voltar:hover{color:#fff}
</style>
</head>
<body>

<header class="header">
  <div class="container">
    <h1><a href="/index-en.html">NextLevel</a></h1>
    <nav class="idiomas">
      <a href="index.html">PT</a>
      <a href="index-en.html" class="atual">EN</a>
      <a href="index-es.html">ES</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h2>Explore by category</h2>
    <p>Pick an area below to see only its guides — or search by name or topic.</p>
    <nav class="chips" id="chips"></nav>
    <div class="busca"><input type="search" id="busca" placeholder="Search guides by name or topic..." aria-label="Search guides"></div>
  </div>
</section>

<main class="container" id="categorias"></main>
<p class="escolha-categoria container" id="escolha-categoria"><b>Choose a category above</b>Click one of the areas to see its guides.</p>
<p class="sem-resultado container" id="sem-resultado">No guides found for this search.</p>

<div class="container" style="text-align:center">
  <a class="voltar" href="/index-en.html">← Back to the home page</a>
</div>

<footer class="footer">NextLevel — all rights reserved. ·
  <a href="/legal/privacidade-en.html">Privacy</a> ·
  <a href="/legal/termos-en.html">Terms of use</a>
</footer>

<script>
// Page generated from /assets/produtos.js: products are grouped by
// `categoria` and each category becomes a section. Categories with no
// listed product don't show up (e.g. investments while it's a draft).
const IDIOMA = 'en';
const SUFIXO_PAGINA = 'index-en.html';
const TXT_EM_BREVE = 'Coming soon';
const TXT_SAIBA_MAIS = 'Learn more →';
const TXT_GUIA = ['guide', 'guides'];

const CATS = window.CATEGORIAS_SITE || {};
const lista = window.PRODUTOS_SITE || [];
const ICO = window.ICONS || {};

const porCategoria = {};
for (const p of lista) {
  const c = p.categoria || 'outros';
  (porCategoria[c] = porCategoria[c] || []).push(p);
}

const ordem = Object.keys(CATS).filter(c => porCategoria[c]).concat(
  Object.keys(porCategoria).filter(c => !CATS[c])
);

document.getElementById('chips').innerHTML = ordem.map(c => {
    const meta = CATS[c] || { icone: ICO.spark || '', nome: { [IDIOMA]: c } };
    return `<a href="#${c}" data-cat="${c}">${meta.icone} ${meta.nome[IDIOMA]}</a>`;
  }).join('');

document.getElementById('categorias').innerHTML = ordem.map(c => {
  const meta = CATS[c] || { icone: ICO.spark || '', nome: { [IDIOMA]: c }, desc: { [IDIOMA]: '' } };
  const prods = porCategoria[c];
  const n = prods.length;
  return `
  <section class="categoria" id="sec-${c}">
    <div class="cat-head"><div class="cat-icone">${meta.icone}</div><h3>${meta.nome[IDIOMA]}</h3></div>
    <p class="cat-desc">${meta.desc ? meta.desc[IDIOMA] : ''}</p>
    <span class="cat-total">${n} ${n === 1 ? TXT_GUIA[0] : TXT_GUIA[1]}</span>
    <div class="grid">${prods.map(p => `
      <a class="card" href="/produtos/${p.slug}/${SUFIXO_PAGINA}">
        ${p.disponivel ? '' : `<span class="em-breve">${TXT_EM_BREVE}</span>`}
        <span class="tag">${p.tag[IDIOMA]}</span>
        <h4>${p.titulo[IDIOMA]}</h4>
        <p>${p.resumo[IDIOMA]}</p>
        <div class="cta">${TXT_SAIBA_MAIS}</div>
      </a>`).join('')}
    </div>
  </section>`;
}).join('');

// ---- filtro por categoria: exige escolha, não tem "mostrar tudo" ----
function aplicarFiltro(cat) {
  const ativo = ordem.includes(cat) ? cat : null;
  document.querySelectorAll('.categoria').forEach(sec => {
    sec.style.display = (ativo && sec.id === 'sec-' + ativo) ? '' : 'none';
  });
  document.querySelectorAll('.chips a').forEach(a => {
    a.classList.toggle('ativa', a.dataset.cat === ativo);
  });
  document.getElementById('escolha-categoria').style.display = ativo ? 'none' : 'block';
  document.getElementById('sem-resultado').style.display = 'none';
}
document.getElementById('chips').addEventListener('click', e => {
  const a = e.target.closest('a');
  if (!a) return;
  e.preventDefault();
  const busca = document.getElementById('busca');
  if (busca.value) { busca.value = ''; }
  const cat = a.dataset.cat;
  history.replaceState(null, '', '#' + cat);
  aplicarFiltro(cat);
});
window.addEventListener('hashchange', () => aplicarFiltro(location.hash.slice(1)));
aplicarFiltro(location.hash.slice(1));

// ---- busca por texto (atravessa todas as categorias, ignora acentos) ----
const campoBusca = document.getElementById('busca');
function normalizar(s) { return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
function aplicarBusca() {
  const q = normalizar(campoBusca.value.trim());
  const msg = document.getElementById('sem-resultado');
  if (!q) {
    document.querySelectorAll('.card').forEach(c => { c.style.display = ''; });
    msg.style.display = 'none';
    aplicarFiltro(location.hash.slice(1));
    return;
  }
  document.getElementById('escolha-categoria').style.display = 'none';
  let total = 0;
  document.querySelectorAll('.categoria').forEach(sec => {
    let n = 0;
    sec.querySelectorAll('.card').forEach(card => {
      const bate = normalizar(card.textContent).includes(q);
      card.style.display = bate ? '' : 'none';
      if (bate) n++;
    });
    sec.style.display = n ? '' : 'none';
    total += n;
  });
  document.querySelectorAll('.chips a').forEach(a => a.classList.remove('ativa'));
  msg.style.display = total ? 'none' : 'block';
}
campoBusca.addEventListener('input', aplicarBusca);

// ---- dados estruturados (ItemList) pro Google ----
(function () {
  var ld = {
    '@context': 'https://schema.org',
    '@type': 'ItemList',
    name: 'NextLevel guides by category',
    numberOfItems: lista.length,
    itemListElement: lista.map((p, i) => ({
      '@type': 'ListItem',
      position: i + 1,
      name: p.titulo[IDIOMA],
      url: 'https://nextlevelbr.app.br/produtos/' + p.slug + '/' + SUFIXO_PAGINA
    }))
  };
  var s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(ld);
  document.head.appendChild(s);
})();
</script>

</body>
